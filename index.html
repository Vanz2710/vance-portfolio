<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Vance Luke Tindoc — full-stack developer building with Laravel, Vue 3 and IoT. Kuala Lumpur, Malaysia."
    />
    <meta property="og:title" content="Vance Tindoc — Full-Stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer and IT graduate building scalable, user-focused web applications. Laravel · Vue 3 · IoT."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#282C33" />
    <script>
      // Apply the saved theme before first paint so a light-mode
      // preference doesn't flash dark on reload. The no-preference
      // fallback must match SETTINGS.theme in src/App.jsx.
      try {
        var t = localStorage.getItem('vt-theme') === 'light' ? 'light' : 'dark'
        document.documentElement.setAttribute('data-theme', t)
        if (t === 'light') {
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#FAFAFA')
        }
      } catch (e) { /* storage unavailable */ }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Vance Tindoc — Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
